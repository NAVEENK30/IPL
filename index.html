<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Auction 2026 - Player Slides</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Rajdhani:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="intro_styles.css">
    <link rel="stylesheet" href="category_styles.css">
    <link rel="stylesheet" href="new_styles.css">
</head>

<body>
    <div class="slideshow-container">
        <!-- Intro Slide (Different Level 3D UI) -->
        <div id="intro-slide-view">
            <div class="intro-3d-bg"></div>

            <div class="intro-content-wrapper">
                <div class="intro-trophy-container">
                    <svg class="trophy-img" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 20 H80 L70 50 Q50 70 30 50 L20 20 Z" fill="#FFD700" stroke="#DAA520"
                            stroke-width="2" />
                        <path d="M45 70 V85 H55 V70" stroke="#FFD700" stroke-width="5" />
                        <rect x="35" y="85" width="30" height="10" fill="#DAA520" />
                        <path d="M15 25 Q5 25 5 40 Q5 55 25 45" fill="none" stroke="#FFD700" stroke-width="3" />
                        <path d="M85 25 Q95 25 95 40 Q95 55 75 45" fill="none" stroke="#FFD700" stroke-width="3" />
                    </svg>
                </div>

                <div class="intro-text-3d">
                    <h1 class="intro-main-title" data-text="PMIST PREMIER LEAGUE">PMIST PREMIER LEAGUE</h1>
                    <h2 class="intro-sub-title">GRAND AUCTION 2026</h2>
                </div>

                <div class="intro-stats-3d">
                    <div class="stat-card-3d">
                        <span class="stat-count" id="stat-batsmen">0</span>
                        <span class="stat-label">BATSMEN</span>
                    </div>
                    <div class="stat-card-3d">
                        <span class="stat-count" id="stat-bowlers">0</span>
                        <span class="stat-label">BOWLERS</span>
                    </div>
                    <div class="stat-card-3d">
                        <span class="stat-count" id="stat-allrounders">0</span>
                        <span class="stat-label">ALL-ROUNDERS</span>
                    </div>
                    <div class="stat-card-3d">
                        <span class="stat-count" id="stat-keepers">0</span>
                        <span class="stat-label">KEEPERS</span>
                    </div>
                </div>

                <button id="start-btn" class="btn-3d-glow">ENTER AUCTION</button>
            </div>
        </div>

        <!-- Background elements for dynamic effects -->

        <!-- Background elements for dynamic effects -->
        <div class="bg-gradient"></div>
        <div class="bg-particles"></div>

        <div class="slide-content" id="slide-content">
            <!-- Content injected by JS -->
            <div class="category-banner" id="category-banner">PMIST PREMIER LEAGUE</div>

            <!-- New Category Title Slide View -->
            <div class="category-slide-view" id="category-slide-view">
                <div id="cat-anim-container" class="cat-anim-container"></div>
                <h1 class="main-cat-title" id="main-cat-title"> 15 PLAYERS PER TEAM</h1>
                <h2 class="sub-cat-title" id="sub-cat-title"> GET READY TO ATHIRADI !!</h2>
            </div>

            <!-- New Set Title Slide View -->
            <div class="set-slide-view" id="set-slide-view">
                <h1 class="set-title" id="set-title">BEGIN</h1>
            </div>


            <div class="main-layout">
                <div class="player-info">
                    <div class="slide-number" id="slide-number">#01</div>
                    <h1 class="player-name" id="player-name">Player Name</h1>
                    <div class="team-badge" id="team-badge">Team Name</div>
                    <div class="base-price" id="base-price">Base Price: ₹ 2 Crore</div>
                    <div class="star-rating" id="star-rating">★★★★★</div>

                </div>

                <div class="player-visual">
                    <div class="image-container">
                        <!-- Placeholder image initially, can be replaced by user -->
                        <img src="murg.jpg" alt="Player Image" id="player-image" class="player-img">
                        <div class="visual-effect-ring"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="prev-btn" class="nav-btn">❮ PREV</button>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <button id="next-btn" class="nav-btn">NEXT ❯</button>
            <button id="auto-btn" class="nav-btn">▶ AUTO</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
